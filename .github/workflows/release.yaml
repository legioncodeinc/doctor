name: Release

# The npm-publish workflow for @legioncodeinc/hivedoctor. HiveDoctor is its own
# dependency-light package (PRD-063 OD-6) released directly from THIS repository
# (github.com/legioncodeinc/hivedoctor). It mirrors the fleet's OIDC
# Trusted-Publishing pattern (same tokenless auth, same fail-closed gating, same
# provenance) and runs at this repo's root on `v*` tags.
#
# JOB SPLIT (mirrors hivenectar's release.yaml, from the CodeRabbit review on
# hivenectar PR #11): the pipeline is TWO jobs, not one. The `gate` job runs
# npm ci, the full package gate, pack-check, the build, and every
# publishability guard under READ-ONLY permissions (contents: read), then hands
# the built `bundle/` to the `publish` job as an artifact. Only the short
# `publish` job holds the publish-capable permissions, and it runs no
# repository code: no npm ci, no build scripts (`npm publish --ignore-scripts`
# skips prepack), so third-party install/build/test code never executes with
# the OIDC publish identity.
#
# BUILD ORDERING INSIDE THE GATE (deliberate, do not reorder): `pack:check`
# runs `prepack` (= npm run build) itself, WITHOUT the telemetry env, which
# overwrites bundle/ with a keyless build. The telemetry-keyed Build step
# therefore runs AFTER pack-check so the artifact uploaded to the publish job
# is the env-baked bundle, not pack-check's keyless rebuild.
#
# AUTH: npm TRUSTED PUBLISHING (OIDC), no NPM_TOKEN. The publish authenticates
# tokenlessly: GitHub Actions presents a short-lived OIDC identity (via the
# `id-token: write` permission on the publish job) that npm verifies against
# the trusted publisher configured on the @legioncodeinc/hivedoctor package
# (org + repo `hivedoctor` + this workflow filename `release.yaml`). There is
# NO long-lived automation token anywhere in this workflow or in repo secrets.
# Provenance stays ON (the same OIDC identity signs the supply-chain
# attestation). Trusted Publishing REQUIRES npm >= 11.5.1, which Node 22 does
# NOT ship (it bundles npm 10.x); see the "Upgrade npm" step.
#
# FAILS CLOSED (read before going live): the same three guards that keep a
# misconfigured or not-cut-yet package from shipping all hold here:
#   * the publishability preflight aborts if the version is 0.0.0 (the
#     deliberate not-cut-yet sentinel) or if the name is not the scoped
#     @legioncodeinc/hivedoctor, so a stray tag push cannot publish a 0.0.0 or a
#     wrong-named package.
#   * a real `npm publish` only happens on a tag push (`vX.Y.Z`) AND when this is
#     not a dry run; a workflow_dispatch always rehearses (gate + `npm publish
#     --dry-run`) and stays green. The publish intent is the TRIGGER (a tag = go
#     live), not a token.
#   * `dry_run` defaults to TRUE so the manual button is safe by default; a
#     maintainer must opt IN to a real publish (and even then, only a pushed tag
#     publishes for real).
#
# Two ways in:
#   * push a tag `vX.Y.Z` -> a real publish attempt (still gated above).
#   * workflow_dispatch with dry_run -> rehearse the whole pipeline without
#     publishing. `dry_run` defaults to TRUE.

on:
  push:
    # A `vX.Y.Z` tag releases this package. This is the hivedoctor repo, so
    # there is no collision concern with the parent honeycomb package's tags.
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Rehearse only: run the gate + `npm publish --dry-run`, never publish for real.'
        type: boolean
        required: false
        default: true

# Cancel a superseded manual rehearse on the same ref. Tag pushes are unique
# refs, so in practice this only coalesces repeated workflow_dispatch runs.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Least privilege, split PER JOB (see the JOB SPLIT note above): the gate job
# is read-only; only the publish job scopes UP, and only for what a publish
# needs:
#   * contents: write  to create the GitHub Release for the pushed tag (only).
#   * id-token: write  the short-lived OIDC identity, double duty: (1) the
#                       publish AUTH for npm Trusted Publishing (replaces
#                       NPM_TOKEN), and (2) provenance signs against it
#                       (`npm publish --provenance`). Without it both fail.

jobs:
  # The read-only gate: install, the full package gate, pack-check, the
  # telemetry-keyed build, and every publishability guard run here, with NO
  # publish-capable permissions. The built bundle/ is handed to the publish
  # job as an artifact so the privileged job never runs npm ci or the
  # compiler.
  gate:
    name: Gate (checks + build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      publish: ${{ steps.mode.outputs.publish }}
    steps:
      # persist-credentials: false so actions/checkout does NOT leave the
      # GITHUB_TOKEN in .git/config where later steps (npm ci, the build)
      # could read it (zizmor artipacked hardening).
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # No `registry-url` here: the gate never authenticates to npm, it only
      # installs and builds. Dependency caching is deliberately OFF on this
      # release pipeline (cache-poisoning hardening); `npm ci` installs from
      # the committed lockfile.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'

      - name: Install (npm ci)
        run: npm ci

      # The FULL package gate, identical recipe to the hivedoctor CI job. A
      # release must clear the same bar as a PR before any tarball is built.
      - name: HiveDoctor gate (typecheck + test)
        run: npm run ci

      # Prove `npm pack`'s tarball carries no forbidden/secret filenames and
      # the bin is present. Runs BEFORE the telemetry-keyed build below
      # because `pack:check` triggers `prepack` (a keyless rebuild) itself;
      # see the BUILD ORDERING note at the top of this file.
      - name: Pack-check (tarball secret/forbidden-file + bin scan)
        run: npm run pack:check

      # Build-time telemetry config. esbuild bakes the PostHog destination in
      # via `define` (__HONEYCOMB_POSTHOG_KEY__ / __HONEYCOMB_POSTHOG_HOST__);
      # an UNSET key compiles to "" which the telemetry chokepoint treats as
      # DISABLED (fail-soft), so a tokenless/fork run emits nothing.
      # Release-only ON PURPOSE: ci.yaml must NOT set these. The key is a
      # PUBLIC write-only ingest key, embedded in the published tarball by
      # design; the secret only keeps it out of logs/fork PRs. This is the
      # LAST build in the pipeline: the publish job packs THIS bundle/
      # verbatim (--ignore-scripts, no prepack rebuild over there).
      - name: Build (tsc + esbuild bin, telemetry-keyed)
        run: npm run build
        env:
          HONEYCOMB_POSTHOG_KEY: ${{ secrets.HONEYCOMB_POSTHOG_KEY }}
          HONEYCOMB_POSTHOG_HOST: ${{ vars.HONEYCOMB_POSTHOG_HOST }}

      # Tag-vs-package.json version guard. On a tag push the pushed tag
      # `vX.Y.Z` MUST equal package.json's version. A mismatch means the tag and
      # the artifact disagree, so abort rather than publish a mislabeled package.
      # Skipped on workflow_dispatch (no tag ref).
      - name: Guard - pushed tag matches package.json version
        if: ${{ github.ref_type == 'tag' }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          # Strip the `v` prefix to get the bare semver.
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: $PKG_VERSION"
          echo "pushed tag:           $GITHUB_REF_NAME (-> $TAG_VERSION)"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag/version mismatch: tag '$GITHUB_REF_NAME' implies version '$TAG_VERSION' but package.json is '$PKG_VERSION'. Bump the version (npm version) and re-tag so the tag and the published artifact agree."
            exit 1
          fi
          echo "OK - tag and package.json agree on $PKG_VERSION"

      # Publishability preflight, FAILS CLOSED. It aborts (before any publish) if
      # EITHER:
      #   * the version is 0.0.0 (the deliberate not-cut-yet sentinel; a real cut
      #     bumps the version via `npm version`); OR
      #   * `name` is not the scoped @legioncodeinc/hivedoctor (a scoped public
      #     package must publish under its scoped name with access=public).
      # A real cut bumps the version (npm version) AND tags vX.Y.Z.
      - name: Preflight - publishability (version + scoped-name guard)
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          PKG_NAME="$(node -p "require('./package.json').name")"
          echo "name:    $PKG_NAME"
          echo "version: $PKG_VERSION"
          FAIL=0
          if [ "$PKG_VERSION" = "0.0.0" ]; then
            echo "::error::package.json version is the 0.0.0 not-cut-yet sentinel. Bump it (npm version <x.y.z>) and tag v<x.y.z> to cut a real release."
            FAIL=1
          fi
          if [ "$PKG_NAME" != "@legioncodeinc/hivedoctor" ]; then
            echo "::error::package.json name is '$PKG_NAME', expected the scoped '@legioncodeinc/hivedoctor'. A scoped public publish requires the scoped name + publishConfig.access=public."
            FAIL=1
          fi
          if [ "$FAIL" = "1" ]; then
            echo "Refusing to publish: the go-live conditions have not all been met."
            exit 1
          fi
          echo "OK - package is publishable (cut version, scoped name)."

      # Resolve publish mode, gated on the TRIGGER, not a token. A real publish
      # requires ALL THREE: a `push` event (NOT a manual dispatch), a tag ref
      # (`vX.Y.Z`), and not a dispatch dry_run. The manual dispatch button always
      # rehearses. Real publishes only come from a pushed `vX.Y.Z` tag. Exported
      # as a job output so the publish job's steps condition on it.
      - name: Resolve publish mode
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ] && [ "$DRY_RUN_INPUT" != "true" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Mode: REAL publish (pushed tag, not a dry run), authenticating via OIDC Trusted Publishing."
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Mode: DRY-RUN (event=$EVENT_NAME, ref_type=$REF_TYPE, dry_run_input=$DRY_RUN_INPUT), running npm publish --dry-run, not publishing."
          fi

      # Hand the just-built, telemetry-keyed bundle/ to the publish job. The
      # tarball npm packs over there is built from THIS gate's checkout; the
      # publish job never re-runs the compiler under elevated permissions.
      - name: Upload built bundle (for the publish job)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle
          path: bundle/
          if-no-files-found: error

  # The publish job: the ONLY job holding publish-capable permissions, kept
  # short and free of repository code execution. It downloads the gate-built
  # bundle/ and publishes it verbatim (--ignore-scripts, so prepack's rebuild
  # is skipped and no devDependency ever installs here).
  publish:
    name: Publish HiveDoctor to npm
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: write
      id-token: write
    steps:
      # Checked out ONLY for the files npm packs alongside bundle/
      # (package.json, README.md, LICENSE); no script from this checkout runs
      # in this job. persist-credentials: false so the write-scoped
      # GITHUB_TOKEN never lands in .git/config (zizmor artipacked hardening);
      # npm publish authenticates via OIDC, and the GitHub Release step uses
      # the token it is handed via the API, not git config.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # `registry-url` is REQUIRED for OIDC Trusted Publishing to engage (writes
      # the explicit registry into ~/.npmrc so npm enters the npmjs auth path).
      # setup-node ALSO scaffolds a DUMMY `_authToken`; the next step strips JUST
      # that line so npm is OIDC-capable AND credential-free. Dependency caching
      # stays OFF (cache-poisoning hardening); this job never installs anyway.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      # Node 22 bundles npm 10.x, but Trusted Publishing (OIDC) requires
      # npm >= 11.5.1. Upgrade BEFORE the publish so every npm invocation is
      # OIDC-capable. Pinned to an EXACT version (must stay >= 11.5.1); bump
      # deliberately.
      - name: Upgrade npm (Trusted Publishing needs npm >= 11.5.1)
        run: npm install -g npm@11.6.2

      # Strip setup-node's dummy `_authToken` line so OIDC authenticates the
      # publish (npm uses OIDC only when NO credential is configured). The
      # registry line is KEPT. Diagnostics printed (token redacted) for a future
      # auth failure.
      - name: Enable OIDC trusted publishing (strip scaffolded auth token)
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$npmrc" ]; then
            sed -i '/:_authToken=/d' "$npmrc"
          fi
          echo "npm version: $(npm --version)"
          echo "registry:    $(npm config get registry)"
          echo "----- effective .npmrc ($npmrc) -----"
          sed -E 's/(_authToken=).*/\1<redacted>/' "$npmrc" 2>/dev/null || echo "(no .npmrc)"

      # The bundle/ the read-only gate built and verified. This is what the
      # tarball ships (`files` allowlist: bundle/cli.js + bundle/package.json,
      # plus README/LICENSE/package.json from the checkout above).
      - name: Download built bundle (from the gate job)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bundle
          path: bundle

      # Diagnostic: confirm GitHub is actually issuing an OIDC identity to this job.
      # npm Trusted Publishing needs ACTIONS_ID_TOKEN_REQUEST_URL present; if this prints
      # ABSENT, the fault is GitHub Actions permissions / org policy (no OIDC token), not
      # npm. If it prints PRESENT but the publish still fails ENEEDAUTH, the fault is the
      # npm-side trusted-publisher config. Prints only presence, never the token value.
      - name: Debug - OIDC token availability
        run: |
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "OIDC id-token endpoint: PRESENT (GitHub is issuing an OIDC identity to this job)"
          else
            echo "OIDC id-token endpoint: ABSENT (no OIDC identity - check 'id-token: write' + org Actions policy)"
          fi

      # Idempotency guard so the publish tail is rerunnable. If a prior run
      # published to npm but then FAILED before minting the GitHub Release, a
      # naive rerun would die here ("cannot publish over an existing version")
      # and never reach the Release step. Probe whether THIS exact version is
      # already on the registry; if so, skip only the upload (below) so the rerun
      # can still create the Release. Fail-closed: only a genuine 404 (not
      # published) sets exists=false; any other npm error (network/registry/auth)
      # aborts rather than guessing the publish state. `npm view` reads public
      # metadata and needs no auth. Real-publish mode only.
      - name: Check whether this version is already on npm
        id: npm_version
        if: ${{ needs.gate.outputs.publish == 'true' }}
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          set +e
          VIEW_OUTPUT="$(npm view "$PKG_NAME@$PKG_VERSION" version --json 2>&1)"
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            echo "Already on the registry: $PKG_NAME@$PKG_VERSION. Skipping the upload; the rerun will go straight to the GitHub Release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif echo "$VIEW_OUTPUT" | grep -q 'E404'; then
            echo "Not yet on the registry: $PKG_NAME@$PKG_VERSION. Will publish."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::\`npm view $PKG_NAME@$PKG_VERSION\` failed with a non-404 error; refusing to guess the publish state. Output below."
            echo "$VIEW_OUTPUT"
            exit "$STATUS"
          fi

      # Publish. `--ignore-scripts` skips prepack (= npm run build): this job
      # has no node_modules and MUST NOT rebuild; it packs the gate-built
      # bundle/ downloaded above.
      #   --provenance   : emit the OIDC supply-chain attestation (needs id-token).
      #   --access public: scoped packages default to restricted; publish public.
      # Auth is TOKENLESS via OIDC (npm >= 11.5.1, ensured above). Skipped when
      # the version is already on npm (the rerun path) so the Release step below
      # can still run.
      - name: Publish (real)
        if: ${{ needs.gate.outputs.publish == 'true' && steps.npm_version.outputs.exists != 'true' }}
        run: npm publish --provenance --access public --ignore-scripts

      # Rehearse: same command minus the real upload. Runs whenever we are NOT in
      # real-publish mode so the pipeline is exercised end-to-end and stays green.
      - name: Publish (dry-run rehearsal)
        if: ${{ needs.gate.outputs.publish != 'true' }}
        run: npm publish --provenance --access public --ignore-scripts --dry-run

      # GitHub Release. Only on a real tag push AND only after a real publish (a
      # dry-run or a rehearsal should not mint a Release). Pinned official action;
      # contents: write (above) is the scope this needs.
      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' && needs.gate.outputs.publish == 'true' }}
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090 # v2.4.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
